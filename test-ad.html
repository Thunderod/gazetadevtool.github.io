<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Gazeta SDK Fullscreen Test</title>

  <!-- Modern CSS Reset for true Edge-to-Edge -->
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      background-color: #111;
      /* Dark background to test boundaries */
      overflow: hidden;
      /* Prevent scrolling */
      /* Setup safe areas for mobile testing */
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      box-sizing: border-box;
    }

    /* A wrapper to hold the ad */
    #ad-container {
      width: 100%;
      height: 100%;
      position: relative;
    }
  </style>

  <!-- 1. Load the Gazeta SDK -->
  <script src="https://thunderod.github.io/gazetadevtool.github.io/gazeta-sdk.js"></script>

  <!-- Optional: Zero-Latency Prefetching -->
  <script>
    // Initialize the SDK early to pre-fetch the heavy video assets in the background
    // Replace 'YOUR_APP_ID' with a real ID from your developer dashboard
    window.Gazeta.init('e0610a30-9c52-4ac2-b8f2-50b9abb941d6', '18-35', 'all');
  </script>
</head>

<body>

  <!-- 2. Mount the Ad Unit -->
  <div id="ad-container">
    <gazeta-ad app-id="e0610a30-9c52-4ac2-b8f2-50b9abb941d6" format="normal" skip-after="5">
      <!-- Optional: Custom Close Button -->
      <button slot="close-button" onclick="alert('User claimed reward!')"
        style="background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 16px; border-radius: 20px; font-weight: bold; cursor: pointer; backdrop-filter: blur(10px);">
        Claim Reward
      </button>
    </gazeta-ad>
  </div>

</body>

</html>
